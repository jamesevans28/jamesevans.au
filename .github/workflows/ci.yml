name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  detect:
    name: Detect app
    runs-on: ubuntu-latest
    outputs:
      exists: ${{ steps.check.outputs.exists }}
    steps:
      - uses: actions/checkout@v7
      # No-op guard: keeps CI green on plan/docs-only commits until the
      # Next.js app is scaffolded (Phase 0 of docs/PLAN.md).
      - id: check
        run: |
          if [ -f package.json ]; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
            echo "No package.json yet — skipping build/test until the app is scaffolded."
          fi

  build-test:
    name: Lint, typecheck, test, build
    needs: detect
    if: needs.detect.outputs.exists == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v7
        with:
          node-version: 24
          cache: npm

      - name: Install
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Unit tests (with coverage)
        run: npm test -- --coverage

      - name: Build (static export)
        run: npm run build

      - name: Upload build output
        uses: actions/upload-artifact@v4
        with:
          name: site
          path: out/
          retention-days: 7
