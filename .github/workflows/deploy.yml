name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

# OIDC role assumption — no long-lived AWS keys in this repo.
permissions:
  contents: read
  id-token: write

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  preflight:
    name: Preflight
    runs-on: ubuntu-latest
    outputs:
      ready: ${{ steps.check.outputs.ready }}
    steps:
      - uses: actions/checkout@v7
      # Dormant until the app is scaffolded AND the repo variables from
      # docs/PLAN.md §9 are set (AWS_DEPLOY_ROLE_ARN, AWS_REGION,
      # SITE_BUCKET, CLOUDFRONT_DISTRIBUTION_ID).
      - id: check
        env:
          ROLE_ARN: ${{ vars.AWS_DEPLOY_ROLE_ARN }}
        run: |
          if [ -f package.json ] && [ -n "$ROLE_ARN" ]; then
            echo "ready=true" >> "$GITHUB_OUTPUT"
          else
            echo "ready=false" >> "$GITHUB_OUTPUT"
            echo "Deploy skipped: app not scaffolded or AWS_DEPLOY_ROLE_ARN not configured."
          fi

  deploy:
    name: Build and deploy to AWS
    needs: preflight
    if: needs.preflight.outputs.ready == 'true'
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v7
        with:
          node-version: 24
          cache: npm

      - name: Install
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Unit tests
        run: npm test

      - name: Build (static export)
        run: npm run build
        env:
          # Baked into the static export at build time (client-side var).
          NEXT_PUBLIC_GA_ID: ${{ vars.NEXT_PUBLIC_GA_ID }}

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ vars.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Sync hashed static assets (immutable cache)
        run: |
          aws s3 sync out/_next/static "s3://${{ vars.SITE_BUCKET }}/_next/static" \
            --cache-control "public,max-age=31536000,immutable"

      - name: Sync site (short cache for HTML)
        run: |
          aws s3 sync out/ "s3://${{ vars.SITE_BUCKET }}" \
            --delete \
            --exclude "_next/static/*" \
            --cache-control "public,max-age=0,must-revalidate"

      - name: Invalidate CloudFront
        run: |
          aws cloudfront create-invalidation \
            --distribution-id "${{ vars.CLOUDFRONT_DISTRIBUTION_ID }}" \
            --paths "/*"
